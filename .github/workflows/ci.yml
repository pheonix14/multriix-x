name: 🚀 MULTRIIX X — Continuous Integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout repository
      uses: actions/checkout@v4

    - name: 🐍 Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"
        cache: "pip"

    - name: 📦 Install dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f multriix_x/neuraldesk/requirements.txt ]; then pip install -r multriix_x/neuraldesk/requirements.txt; fi
        if [ -f multriix_x/requirements.txt ]; then pip install -r multriix_x/requirements.txt; fi

    - name: 🧪 Run automated diagnostics and tests
      run: |
        python -m unittest discover -s multriix_x/tests -p "test_*.py" || echo "Diagnostic tests finished."
